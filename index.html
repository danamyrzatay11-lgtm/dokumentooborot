// ─── Helpers ──────────────────────────────────────────────────────────────────

function getStatusInfo(statusId, folderId) {
  const isEmp = EMPLOYEE_FOLDER_IDS.includes(folderId);
  const list = isEmp ? EMPLOYEE_STATUSES : CONTRACT_STATUSES;
  return list.find(s => s.id === statusId) || list[0];
}
function getDaysUntil(d) { if (!d) return null; return Math.ceil((new Date(d) - new Date()) / 86400000); }
function formatDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' }); }
function formatAmount(a) { if (!a) return null; return new Intl.NumberFormat('ru-RU').format(a) + ' ₸'; }
function useLocalStorage(key, init) {
  const [v, setV] = useState(() => {
    try {
      const s = localStorage.getItem(key);
      if (!s) return init;
      const stored = JSON.parse(s);
      // Merge: add any new items from init that don't exist in stored (by id)
      if (Array.isArray(stored) && Array.isArray(init)) {
        const ids = new Set(stored.map(x => x.id));
        const newItems = init.filter(x => !ids.has(x.id));
        return newItems.length ? [...stored, ...newItems] : stored;
      }
      return stored;
    } catch { return init; }
  });
  useEffect(() => { localStorage.setItem(key, JSON.stringify(v)); }, [key, v]);
  return [v, setV];
}
function flattenTree(tree) { const r = []; tree.forEach(g => { r.push(g); (g.children||[]).forEach(c => r.push(c)); }); return r; }

  const steps = CONTRACT_STATUSES.filter(x => x.step);
  const gradients = [
    'from-amber-400 to-amber-500',
    'from-sky-400 to-sky-500',
    'from-violet-400 to-violet-600',
    'from-emerald-400 to-emerald-600',
    'from-orange-400 to-orange-600',
    'from-green-500 to-green-700',
  ];
  return (
    <div className="mb-5 p-4 bg-gradient-to-r from-violet-50 to-indigo-50 rounded-2xl border border-violet-100">
      <div className="flex gap-1.5 mb-2">
        {steps.map((x, i) => (
          <div key={x.id} className={`h-2.5 flex-1 rounded-full transition-all ${x.step <= step ? `bg-gradient-to-r ${gradients[i]}` : 'bg-gray-200'}`}></div>
        ))}
      </div>
      <div className="flex justify-between text-xs font-medium text-violet-400">
        <span>Инициация</span><span>Завершён</span>
      </div>
    </div>
  );
}

// ─── Modal ────────────────────────────────────────────────────────────────────

function Modal({ children, onClose }) {
  useEffect(() => {
    const h = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-violet-950/50 backdrop-blur-sm" onClick={onClose}>
      <div className="bg-white rounded-3xl shadow-2xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto fade-in border border-violet-100" onClick={e => e.stopPropagation()}>
        {children}
      </div>
    </div>
  );
}

// ─── DocForm ──────────────────────────────────────────────────────────────────

function DocForm({ doc, folderId, folders, onSave, onClose }) {
  const isEmp = EMPLOYEE_FOLDER_IDS.includes(folderId);
  const statuses = isEmp ? EMPLOYEE_STATUSES : CONTRACT_STATUSES;
  const [form, setForm] = useState(doc || {
    folderId: folderId || folders[0]?.id || '',
    name: '', type: DOC_TYPES[0], counterparty: '', amount: '',
    startDate: '', endDate: '', fileName: '', comment: '',
    status: statuses[0]?.id || 'initiation',
  });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const handleSubmit = e => {
    e.preventDefault();
    if (!form.name.trim() || !form.counterparty.trim()) return;
    onSave({ ...form, id: doc?.id || Date.now().toString(), amount: form.amount ? Number(form.amount) : null });
  };
  const selEmp = EMPLOYEE_FOLDER_IDS.includes(form.folderId);
  const statusList = selEmp ? EMPLOYEE_STATUSES : CONTRACT_STATUSES;
  const inp = "w-full border-2 border-violet-100 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-violet-400 focus:ring-0 bg-violet-50/30 transition";

  return (
    <form onSubmit={handleSubmit}>
      <div className="p-6 border-b border-violet-100 bg-gradient-to-r from-violet-600 to-indigo-600 rounded-t-3xl">
        <h2 className="text-xl font-bold text-white">{doc ? '✏️ Редактировать документ' : '✨ Новый документ'}</h2>
      </div>
      <div className="p-6 grid grid-cols-2 gap-4">
        <div className="col-span-2">
          <label className="block text-xs font-bold text-violet-700 mb-1 uppercase tracking-wide">Название *</label>
          <input className={inp} value={form.name} onChange={e => set('name', e.target.value)} placeholder="Название документа" required />
        </div>
        <div>
          <label className="block text-xs font-bold text-violet-700 mb-1 uppercase tracking-wide">Папка</label>
          <select className={inp} value={form.folderId} onChange={e => set('folderId', e.target.value)}>
            {folders.filter(f => f.children === undefined).map(f => <option key={f.id} value={f.id}>{f.label}</option>)}
          </select>
        </div>
        <div>
          <label className="block text-xs font-bold text-violet-700 mb-1 uppercase tracking-wide">Тип</label>
          <select className={inp} value={form.type} onChange={e => set('type', e.target.value)}>
            {DOC_TYPES.map(t => <option key={t}>{t}</option>)}
          </select>
        </div>
        <div>
          <label className="block text-xs font-bold text-violet-700 mb-1 uppercase tracking-wide">Контрагент *</label>
          <input className={inp} value={form.counterparty} onChange={e => set('counterparty', e.target.value)} placeholder="ФИО или компания" required />
        </div>
        <div>
          <label className="block text-xs font-bold text-violet-700 mb-1 uppercase tracking-wide">Сумма (₸)</label>
          <input type="number" className={inp} value={form.amount} onChange={e => set('amount', e.target.value)} placeholder="0" />
        </div>
        <div>
          <label className="block text-xs font-bold text-violet-700 mb-1 uppercase tracking-wide">Дата начала</label>
          <input type="date" className={inp} value={form.startDate} onChange={e => set('startDate', e.target.value)} />
        </div>
        <div>
          <label className="block text-xs font-bold text-violet-700 mb-1 uppercase tracking-wide">Дата окончания</label>
          <input type="date" className={inp} value={form.endDate} onChange={e => set('endDate', e.target.value)} />

        <div>
          <label className="block text-xs font-bold text-violet-700 mb-1 uppercase tracking-wide">Статус</label>
          <select className={inp} value={form.status} onChange={e => set('status', e.target.value)}>

          <label className="block text-xs font-bold text-violet-700 mb-1 uppercase tracking-wide">Файл (имя)</label>
          <input className={inp} value={form.fileName} onChange={e => set('fileName', e.target.value)} placeholder="contract.pdf" />
        </div>
        <div className="col-span-2">
          <label className="block text-xs font-bold text-violet-700 mb-1 uppercase tracking-wide">Комментарий</label>
          <textarea className={inp + " resize-none"} rows={3} value={form.comment} onChange={e => set('comment', e.target.value)} placeholder="Дополнительные сведения..." />

      <div className="p-6 border-t border-violet-100 flex justify-end gap-3">
        <button type="button" onClick={onClose} className="px-4 py-2 rounded-xl text-sm font-medium text-violet-600 hover:bg-violet-50 transition border border-violet-200">Отмена</button>

// ─── DocDetail ────────────────────────────────────────────────────────────────

function StepsChecklist({ doc, onToggle }) {
  const def = getStepsDef(doc.folderId);
  if (!def) return null;
  const steps = doc.steps || defaultSteps(doc.folderId) || {};
  const done = def.filter(s => steps[s.id]).length;
  const pct = Math.round((done / def.length) * 100);
  return (
    <div className="bg-gradient-to-br from-violet-50 to-indigo-50 rounded-2xl p-4 border border-violet-100 mb-5">
      <div className="flex items-center justify-between mb-3">
        <span className="text-xs font-bold text-violet-600 uppercase tracking-wide">Цепочка действий</span>
        <span className="text-xs font-bold text-violet-500">{done}/{def.length} выполнено</span>
      </div>
      <div className="w-full bg-violet-100 rounded-full h-1.5 mb-3">
        <div className="bg-gradient-to-r from-violet-500 to-indigo-500 h-1.5 rounded-full transition-all" style={{width: pct + '%'}}></div>
      </div>
      <div className="space-y-2">
        {def.map(s => {
          const checked = !!steps[s.id];
          return (
            <button key={s.id} onClick={() => onToggle(doc.id, s.id, !checked)}
              className={`w-full flex items-center gap-3 px-3 py-2 rounded-xl text-sm transition text-left ${checked ? 'bg-emerald-50 border border-emerald-200' : 'bg-white border border-gray-200 hover:border-violet-300'}`}>
              <div className={`w-5 h-5 rounded-full flex items-center justify-center text-xs flex-shrink-0 ${checked ? 'bg-emerald-500 text-white' : 'bg-gray-100 border-2 border-gray-300'}`}>
                {checked ? '✓' : ''}
              </div>
              <span className={checked ? 'line-through text-gray-400 font-medium' : 'text-gray-700 font-medium'}>
                {s.icon} {s.label}
              </span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function DocDetail({ doc, folders, onClose, onEdit, onDelete, onStatusChange, onStepToggle }) {
  const isEmp = EMPLOYEE_FOLDER_IDS.includes(doc.folderId);
  const statuses = isEmp ? EMPLOYEE_STATUSES : CONTRACT_STATUSES;
  const folder = flattenTree(folders).find(f => f.id === doc.folderId);
  const days = getDaysUntil(doc.endDate);
  const isOverdue = days !== null && days < 0;
  const isExpiringSoon = days !== null && days >= 0 && days <= 30;
  const currentStep = CONTRACT_STATUSES.find(s => s.id === doc.status)?.step || 0;
  const nextStatus = !isEmp && CONTRACT_STATUSES.find(s => s.step === currentStep + 1);

  return (
    <div>
      <div className="p-6 bg-gradient-to-br from-violet-600 via-indigo-600 to-blue-600 rounded-t-3xl flex items-start justify-between gap-4">
        <div>
          <div className="text-xs text-violet-200 mb-1 font-medium">{folder?.label}</div>
          <h2 className="text-xl font-bold text-white leading-tight">{doc.name}</h2>
          <div className="mt-2.5 flex items-center gap-2 flex-wrap">
            <Badge statusId={doc.status} folderId={doc.folderId} />
            <span className="text-xs bg-white/20 text-white px-2.5 py-0.5 rounded-full font-medium">{doc.type}</span>
          </div>
        </div>
        <button onClick={onClose} className="text-white/70 hover:text-white text-2xl leading-none mt-1">×</button>
      </div>
      <div className="p-6">
        <StepsChecklist doc={doc} onToggle={onStepToggle} />
        {!isEmp && <ProgressBar statusId={doc.status} />}

        {(isOverdue || isExpiringSoon) && (
          <div className={`mb-4 px-4 py-3 rounded-2xl text-sm font-semibold flex items-center gap-2 ${isOverdue ? 'bg-red-500 text-white' : 'bg-amber-400 text-amber-900'}`}>
            {isOverdue ? `⚠️ Договор просрочен на ${Math.abs(days)} дн.` : `⏰ Истекает через ${days} дн. (${formatDate(doc.endDate)})`}
          </div>
        )}

        <div className="grid grid-cols-2 gap-3 mb-5">
          {[
            { label: 'Контрагент', value: doc.counterparty },
            doc.amount ? { label: 'Сумма', value: formatAmount(doc.amount) } : null,
            doc.startDate ? { label: 'Дата начала', value: formatDate(doc.startDate) } : null,
            doc.endDate ? { label: 'Дата окончания', value: formatDate(doc.endDate) } : null,
          ].filter(Boolean).map(item => (
            <div key={item.label} className="bg-gradient-to-br from-violet-50 to-indigo-50 rounded-xl p-3 border border-violet-100">
              <div className="text-xs font-bold text-violet-400 uppercase tracking-wide mb-0.5">{item.label}</div>
              <div className="text-sm font-semibold text-gray-800">{item.value}</div>
            </div>
          ))}
          {doc.fileName && (
            <div className="col-span-2 bg-indigo-50 rounded-xl p-3 border border-indigo-100 flex items-center gap-2">
              <span className="text-lg">📎</span>
              <div>
                <div className="text-xs font-bold text-indigo-400 uppercase tracking-wide mb-0.5">Файл</div>
                <div className="text-sm font-medium text-indigo-700">{doc.fileName}</div>
              </div>
            </div>
          )}
          {doc.comment && (
            <div className="col-span-2 bg-amber-50 rounded-xl p-3 border border-amber-100">
              <div className="text-xs font-bold text-amber-500 uppercase tracking-wide mb-0.5">Комментарий</div>
              <div className="text-sm text-gray-700">{doc.comment}</div>
            </div>
          )}
        </div>

        <div className="bg-gradient-to-br from-violet-50 to-indigo-50 rounded-2xl p-4 border border-violet-100">
          <div className="text-xs font-bold text-violet-500 uppercase tracking-wide mb-3">Сменить статус</div>
          <div className="flex flex-wrap gap-2">
            {statuses.map(s => (
              <button key={s.id} onClick={() => onStatusChange(doc.id, s.id)}
                className={`px-3 py-1.5 rounded-xl text-xs font-bold transition shadow-sm ${doc.status === s.id ? s.color + ' ring-2 ring-offset-2 ring-violet-400 scale-105' : 'bg-white border-2 border-violet-100 text-violet-600 hover:border-violet-400'}`}>
                {s.label}
              </button>
            ))}
          </div>
          {nextStatus && (
            <button onClick={() => onStatusChange(doc.id, nextStatus.id)}
              className="mt-3 w-full py-2.5 rounded-xl text-sm font-bold bg-gradient-to-r from-violet-600 to-indigo-600 text-white hover:from-violet-700 hover:to-indigo-700 transition shadow-md">
              → Следующий этап: {nextStatus.label}
            </button>
          )}
        </div>
      </div>
      <div className="p-6 border-t border-violet-100 flex gap-3">
        <button onClick={() => onEdit(doc)} className="flex-1 py-2.5 rounded-xl text-sm font-bold border-2 border-violet-200 text-violet-700 hover:bg-violet-50 transition">Редактировать</button>
        <button onClick={() => { if (confirm('Удалить документ?')) { onDelete(doc.id); onClose(); } }} className="px-5 py-2.5 rounded-xl text-sm font-bold text-white bg-red-500 hover:bg-red-600 transition">Удалить</button>
      </div>
    </div>
  );
}

// ─── DocCard ──────────────────────────────────────────────────────────────────

function DocCard({ doc, view, onClick }) {
  const days = getDaysUntil(doc.endDate);
  const isOverdue = days !== null && days < 0;
  const isExpiringSoon = days !== null && days >= 0 && days <= 30;
  const border = isOverdue
    ? 'border-red-300 bg-gradient-to-br from-red-50 to-rose-50'
    : isExpiringSoon
    ? 'border-amber-300 bg-gradient-to-br from-amber-50 to-yellow-50'
    : 'border-violet-100 bg-white';

  if (view === 'list') {
    return (
      <div onClick={onClick} className={`border-2 rounded-2xl p-4 cursor-pointer card-hover flex items-center gap-4 ${border}`}>
        <div className="flex-1 min-w-0">
          <div className="font-bold text-gray-800 text-sm truncate">{doc.name}</div>
          <div className="text-xs text-violet-500 mt-0.5 font-medium">{doc.counterparty}</div>
        </div>
        <div className="hidden sm:block text-xs text-gray-400 w-24 shrink-0 font-medium">{formatDate(doc.endDate)}</div>
        {doc.amount && <div className="hidden sm:block text-sm font-bold text-indigo-700 w-28 shrink-0 text-right">{formatAmount(doc.amount)}</div>}
        <Badge statusId={doc.status} folderId={doc.folderId} />
        {isExpiringSoon && !isOverdue && <span className="text-xs bg-amber-400 text-amber-900 font-bold px-2 py-0.5 rounded-full shrink-0">{days}д.</span>}
        {isOverdue && <span className="text-xs bg-red-500 text-white font-bold px-2 py-0.5 rounded-full shrink-0">просрочен</span>}
      </div>
    );
  }

  return (
    <div onClick={onClick} className={`border-2 rounded-2xl p-5 cursor-pointer card-hover ${border}`}>
      <div className="flex items-start justify-between gap-2 mb-3">
        <div className="font-bold text-gray-800 text-sm leading-snug line-clamp-2 flex-1">{doc.name}</div>
        <Badge statusId={doc.status} folderId={doc.folderId} />
      </div>
      <div className="text-xs font-semibold text-violet-500 mb-3">{doc.counterparty}</div>
      <div className="flex items-center justify-between">
        <span className="text-xs bg-violet-100 text-violet-700 font-semibold px-2 py-0.5 rounded-lg">{doc.type}</span>
        {doc.endDate && <span className={`text-xs font-bold ${isOverdue ? 'bg-red-500 text-white px-2 py-0.5 rounded-full' : isExpiringSoon ? 'bg-amber-400 text-amber-900 px-2 py-0.5 rounded-full' : 'text-gray-400'}`}>
          {isOverdue ? '⚠ просрочен' : isExpiringSoon ? `⏰ ${days} дн.` : formatDate(doc.endDate)}
        </span>}
      </div>
      {doc.amount && <div className="mt-2.5 text-base font-extrabold text-indigo-700">{formatAmount(doc.amount)}</div>}
    </div>
  );
}

// ─── Dashboard ────────────────────────────────────────────────────────────────

function Dashboard({ docs, folders, onSelectFolder }) {
  const active = docs.filter(d => d.status === 'active');
  const expiring = docs.filter(d => { const days = getDaysUntil(d.endDate); return days !== null && days >= 0 && days <= 30; });
  const done = docs.filter(d => d.status === 'done');
  const actionNeeded = docs.filter(d => ['closing', 'review'].includes(d.status));
  const byFolder = useMemo(() => { const m = {}; docs.forEach(d => { m[d.folderId] = (m[d.folderId]||0)+1; }); return m; }, [docs]);

  const stats = [
    { label: 'Всего документов', value: docs.length, gradient: 'from-violet-500 to-indigo-600', icon: '📄' },
    { label: 'Активных',         value: active.length, gradient: 'from-emerald-400 to-teal-500', icon: '✅' },
    { label: 'Истекают скоро',   value: expiring.length, gradient: 'from-amber-400 to-orange-500', icon: '⏰' },
    { label: 'Завершённых',      value: done.length, gradient: 'from-blue-400 to-cyan-500', icon: '📦' },

  return (
    <div className="fade-in">
      <div className="mb-6">

        <p className="text-sm text-violet-400 mt-1 font-medium">Обзор всех документов компании</p>
      </div>

      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        {stats.map(c => (
          <div key={c.label} className={`rounded-2xl p-5 bg-gradient-to-br ${c.gradient} text-white shadow-lg`}>
            <div className="text-3xl mb-2">{c.icon}</div>
            <div className="text-4xl font-extrabold mb-1">{c.value}</div>
            <div className="text-sm font-semibold opacity-90">{c.label}</div>
          </div>
        ))}
      </div>

      {expiring.length > 0 && (
        <div className="mb-8">
          <h2 className="text-base font-bold text-gray-700 mb-3 flex items-center gap-2">
            <span className="w-3 h-3 rounded-full bg-amber-400 inline-block shadow-sm shadow-amber-300"></span> Истекают в ближайшие 30 дней
          </h2>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
            {expiring.map(d => {
              const days = getDaysUntil(d.endDate);
              return (
                <div key={d.id} className="bg-gradient-to-br from-amber-50 to-yellow-100 border-2 border-amber-300 rounded-2xl p-4 shadow-sm">
                  <div className="font-bold text-sm text-gray-800 mb-1 truncate">{d.name}</div>
                  <div className="text-xs text-amber-700 font-semibold mb-2">{d.counterparty}</div>
                  <div className="flex items-center justify-between">
                    <Badge statusId={d.status} folderId={d.folderId} />
                    <span className="text-xs font-extrabold bg-amber-400 text-amber-900 px-2.5 py-1 rounded-full">{days} дн.</span>
                  </div>
                </div>

      {actionNeeded.length > 0 && (
        <div className="mb-8">
          <h2 className="text-base font-bold text-gray-700 mb-3 flex items-center gap-2">
            <span className="w-3 h-3 rounded-full bg-orange-500 inline-block shadow-sm shadow-orange-300"></span> Требуют действия
          </h2>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
            {actionNeeded.map(d => (
              <div key={d.id} className="bg-gradient-to-br from-orange-50 to-red-50 border-2 border-orange-300 rounded-2xl p-4 shadow-sm">
                <div className="font-bold text-sm text-gray-800 mb-1 truncate">{d.name}</div>
                <div className="text-xs text-orange-700 font-semibold mb-2">{d.counterparty}</div>
                <Badge statusId={d.status} folderId={d.folderId} />
              </div>

      <div>
        <h2 className="text-base font-bold text-gray-700 mb-3">По папкам</h2>
        <div className="grid grid-cols-2 lg:grid-cols-3 gap-3">
          {flattenTree(folders).filter(f => !f.children && byFolder[f.id]).map((f, i) => {
            const gradients = ['from-violet-500 to-purple-600','from-indigo-500 to-blue-600','from-pink-500 to-rose-600','from-teal-500 to-cyan-600','from-amber-500 to-orange-600','from-green-500 to-emerald-600'];

                <div className="text-sm font-bold opacity-90 mb-1">{f.label}</div>
                <div className="text-3xl font-extrabold">{byFolder[f.id]}</div>
                <div className="text-xs opacity-75 font-medium">документов</div>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────

// ─── Contract Generator ───────────────────────────────────────────────────────

function escapeXml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&apos;');
}

function replaceInDocxXml(xml, replacements) {
  // Process paragraph by paragraph, merging runs so split text is handled
  return xml.replace(/(<w:p(?:\s[^>]*)?>)([\s\S]*?)(<\/w:p>)/g, (match, open, content, close) => {
    // Concatenate all w:t text in this paragraph
    const fullText = content.replace(/<w:t(?:[^>]*)>([\s\S]*?)<\/w:t>/g, '$1');
    let newText = fullText;
    let changed = false;
    for (const [from, to] of replacements) {
      if (from.trim() && newText.includes(from.trim())) {
        newText = newText.split(from.trim()).join(to);
        changed = true;
      }
    }
    if (!changed) return match;
    // Extract paragraph props and first run props for formatting
    const pPr = content.match(/<w:pPr>[\s\S]*?<\/w:pPr>/)?.[0] || '';
    const firstRun = content.match(/<w:r(?:\s[^>]*)?>[\s\S]*?<\/w:r>/)?.[0] || '';
    const rPr = firstRun.match(/<w:rPr>[\s\S]*?<\/w:rPr>/)?.[0] || '';
    const newRun = `<w:r>${rPr}<w:t xml:space="preserve">${escapeXml(newText)}</w:t></w:r>`;
    return `${open}${pPr}${newRun}${close}`;
  });
}

async function generateDocx(templateFile, replacements) {
  const arrayBuffer = await templateFile.arrayBuffer();
  const zip = await JSZip.loadAsync(arrayBuffer);
  // Replace in document.xml
  let docXml = await zip.file('word/document.xml').async('string');
  docXml = replaceInDocxXml(docXml, replacements);
  zip.file('word/document.xml', docXml);
  // Also replace in headers/footers
  for (const path of Object.keys(zip.files)) {
    if (/word\/(header|footer)\d*\.xml$/.test(path)) {
      let c = await zip.file(path).async('string');
      c = replaceInDocxXml(c, replacements);
      zip.file(path, c);
    }
  }
  return zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
}

function detectFields(xmlText) {
  // Extract readable text from XML
  const texts = [];
  const paraMatches = xmlText.match(/<w:p(?:\s[^>]*)?>[\s\S]*?<\/w:p>/g) || [];
  for (const p of paraMatches) {
    const t = (p.match(/<w:t[^>]*>([\s\S]*?)<\/w:t>/g) || [])
      .map(m => m.replace(/<[^>]+>/g, '')).join('');
    if (t.trim()) texts.push(t.trim());
  }
  const full = texts.join(' ');

  const fields = [];
  // Contract number
  const numMatch = full.match(/№\s*([\w/]+)/);
  if (numMatch) fields.push({ key: 'num', label: 'Номер договора', detected: numMatch[1] });
  // Date of contract
  const dateMatch = full.match(/«(\d+)»\s+(\w+)\s+(\d{4})\s*г/);
  if (dateMatch) fields.push({ key: 'date', label: 'Дата договора', detected: `«${dateMatch[1]}» ${dateMatch[2]} ${dateMatch[3]} г` });
  // Contractor name — Cyrillic capitalized words after "и " or before "гражданин"
  const nameMatch = full.match(/,\s+и\s+([А-ЯӘҒҚҢӨҰҮІа-яәғқңөұүі]+\s+[А-ЯӘҒҚҢӨҰҮІ][а-яәғқңөұүі]+(?:\s+[А-ЯӘҒҚҢӨҰҮІ][а-яәғқңөұүі]+)?)\s*,?\s*гражданин/);
  if (nameMatch) fields.push({ key: 'name', label: 'ФИО исполнителя', detected: nameMatch[1].trim() });
  // IIN
  const iinMatch = full.match(/ИИН\s*([0-9]{12})/);
  if (iinMatch) fields.push({ key: 'iin', label: 'ИИН', detected: iinMatch[1] });
  // ID number
  const idMatch = full.match(/удостоверение личности[^0-9]*([0-9]{9})/i);
  if (idMatch) fields.push({ key: 'id', label: 'Номер удостоверения', detected: idMatch[1] });
  // ID issue date
  const idDateMatch = full.match(/(?:выдано|выдан)\s+МВД\s+РК\s+от\s+([\d.]+\s*г?\.?)/i);
  if (idDateMatch) fields.push({ key: 'iddate', label: 'Дата выдачи УД', detected: idDateMatch[1].trim() });
  // Address
  const addrMatch = full.match(/адрес[^:]*:\s*([^,\.]+(?:,[^,\.]+){1,4})/i);
  if (addrMatch) fields.push({ key: 'addr', label: 'Адрес регистрации', detected: addrMatch[1].trim() });

  return fields;
}

function ContractGenerator({ onClose }) {
  const [step, setStep] = useState(1);
  const [file, setFile] = useState(null);
  const [fields, setFields] = useState([]);
  const [newValues, setNewValues] = useState({});
  const [customRows, setCustomRows] = useState([{ from: '', to: '' }]);
  const [loading, setLoading] = useState(false);
  const [dragOver, setDragOver] = useState(false);
  const fileRef = React.useRef();

  const handleFile = async (f) => {
    if (!f || !f.name.endsWith('.docx')) { alert('Загрузите файл .docx'); return; }
    setFile(f);
    setLoading(true);
    try {
      const ab = await f.arrayBuffer();
      const zip = await JSZip.loadAsync(ab);
      const xml = await zip.file('word/document.xml').async('string');
      const detected = detectFields(xml);
      setFields(detected);
      const vals = {};
      detected.forEach(d => { vals[d.key] = ''; });
      setNewValues(vals);
      setStep(2);
    } catch(e) { alert('Ошибка чтения файла: ' + e.message); }
    setLoading(false);
  };

  const handleGenerate = async () => {
    setLoading(true);
    try {
      // Build replacements list: [from, to]
      const replacements = [];
      fields.forEach(f => {
        if (f.detected && newValues[f.key]?.trim()) {
          replacements.push([f.detected, newValues[f.key].trim()]);
        }
      });
      customRows.forEach(r => {
        if (r.from.trim() && r.to.trim()) replacements.push([r.from, r.to]);
      });
      if (!replacements.length) { alert('Заполните хотя бы одно поле для замены'); setLoading(false); return; }
      const blob = await generateDocx(file, replacements);
      // Download
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const baseName = file.name.replace('.docx', '');
      const newName = newValues['name']?.trim() || 'новый';
      a.download = `${baseName}_${newName}.docx`;
      a.click();
      URL.revokeObjectURL(url);
      setStep(3);
    } catch(e) { alert('Ошибка генерации: ' + e.message); }
    setLoading(false);
  };

  const inp = "w-full border-2 border-violet-100 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-violet-400 bg-white";

  return (
    <div>
      {/* Header */}
      <div className="p-6 bg-gradient-to-r from-fuchsia-600 to-violet-600 rounded-t-3xl flex items-center justify-between">
        <div>
          <h2 className="text-xl font-bold text-white">⚡ Генератор договоров</h2>
          <p className="text-fuchsia-200 text-xs mt-1">Загрузите шаблон — система заменит данные автоматически</p>
        </div>
        <button onClick={onClose} className="text-white/70 hover:text-white text-2xl">×</button>
      </div>

      {/* Steps indicator */}
      <div className="px-6 pt-5 flex items-center gap-2">
        {[{n:1,label:'Шаблон'},{n:2,label:'Данные'},{n:3,label:'Готово'}].map((s,i) => (
          <React.Fragment key={s.n}>
            <div className={`flex items-center gap-2 ${step >= s.n ? 'text-violet-700' : 'text-gray-300'}`}>
              <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${step > s.n ? 'bg-green-500 text-white' : step === s.n ? 'bg-violet-600 text-white' : 'bg-gray-200 text-gray-400'}`}>
                {step > s.n ? '✓' : s.n}
              </div>
              <span className="text-xs font-semibold hidden sm:block">{s.label}</span>
            </div>
            {i < 2 && <div className={`flex-1 h-0.5 ${step > s.n ? 'bg-green-400' : 'bg-gray-200'}`}></div>}
          </React.Fragment>
        ))}
      </div>

      <div className="p-6">
        {/* Step 1: Upload */}
        {step === 1 && (
          <div>
            <p className="text-sm text-gray-600 mb-4">Загрузите шаблон договора в формате <strong>.docx</strong>. Система автоматически найдёт ФИО, ИИН, номер договора и другие поля.</p>
            <div
              onDragOver={e => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              onDrop={e => { e.preventDefault(); setDragOver(false); handleFile(e.dataTransfer.files[0]); }}
              onClick={() => fileRef.current?.click()}
              className={`border-2 border-dashed rounded-2xl p-10 text-center cursor-pointer transition ${dragOver ? 'border-violet-500 bg-violet-50' : 'border-violet-200 hover:border-violet-400 hover:bg-violet-50/50'}`}>
              <div className="text-5xl mb-3">📄</div>
              <div className="font-bold text-violet-700 mb-1">Перетащите файл сюда</div>
              <div className="text-sm text-violet-400">или нажмите для выбора .docx файла</div>
              <input ref={fileRef} type="file" accept=".docx" className="hidden" onChange={e => handleFile(e.target.files[0])} />
            </div>
            {loading && <div className="mt-4 text-center text-violet-500 font-medium animate-pulse">Анализирую шаблон...</div>}
          </div>
        )}

        {/* Step 2: Fill fields */}
        {step === 2 && (
          <div>
            <div className="bg-violet-50 border border-violet-200 rounded-xl px-4 py-3 mb-5 flex items-center gap-2">
              <span className="text-lg">📎</span>
              <div>
                <div className="text-sm font-bold text-violet-800">{file?.name}</div>
                <div className="text-xs text-violet-500">Найдено полей: {fields.length}</div>
              </div>
              <button onClick={() => setStep(1)} className="ml-auto text-xs text-violet-500 hover:text-violet-700 underline">Сменить</button>
            </div>

            {fields.length > 0 ? (
              <div className="space-y-4 mb-6">
                <p className="text-xs font-bold text-violet-500 uppercase tracking-wide">Автоматически найденные поля</p>
                {fields.map(f => (
                  <div key={f.key} className="grid grid-cols-2 gap-3 items-start">
                    <div>
                      <div className="text-xs font-semibold text-gray-500 mb-1">{f.label} <span className="text-violet-400">(в шаблоне)</span></div>
                      <div className="bg-gray-100 border border-gray-200 rounded-xl px-3 py-2 text-sm text-gray-700 font-mono truncate">{f.detected}</div>
                    </div>
                    <div>
                      <div className="text-xs font-semibold text-gray-500 mb-1">{f.label} <span className="text-emerald-500">(новое значение)</span></div>
                      <input className={inp} placeholder={`Новый ${f.label.toLowerCase()}...`}
                        value={newValues[f.key] || ''} onChange={e => setNewValues(v => ({ ...v, [f.key]: e.target.value }))} />
                    </div>
                  </div>
                ))}
              </div>
            ) : (
              <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-4 text-sm text-amber-700">
                ⚠️ Стандартные поля не найдены. Добавьте замены вручную ниже.
              </div>
            )}

            {/* Custom replacements */}
            <div className="border-t border-violet-100 pt-4">
              <p className="text-xs font-bold text-violet-500 uppercase tracking-wide mb-3">Дополнительные замены</p>
              <div className="space-y-2">
                {customRows.map((row, i) => (
                  <div key={i} className="flex gap-2 items-center">
                    <input className={inp + " flex-1"} placeholder="Найти в шаблоне..." value={row.from}
                      onChange={e => setCustomRows(rows => rows.map((r,j) => j===i ? {...r,from:e.target.value} : r))} />
                    <span className="text-violet-400 font-bold">→</span>
                    <input className={inp + " flex-1"} placeholder="Заменить на..." value={row.to}
                      onChange={e => setCustomRows(rows => rows.map((r,j) => j===i ? {...r,to:e.target.value} : r))} />
                    {customRows.length > 1 && (
                      <button onClick={() => setCustomRows(rows => rows.filter((_,j) => j!==i))} className="text-red-400 hover:text-red-600 text-lg">×</button>
                    )}
                  </div>
                ))}
              </div>
              <button onClick={() => setCustomRows(r => [...r, {from:'',to:''}])}
                className="mt-2 text-xs text-violet-600 hover:text-violet-800 font-bold flex items-center gap-1">
                <span>+</span> Добавить поле
              </button>
            </div>
          </div>
        )}

        {/* Step 3: Done */}
        {step === 3 && (
          <div className="text-center py-6">
            <div className="text-6xl mb-4">🎉</div>
            <h3 className="text-xl font-bold text-gray-800 mb-2">Договор сгенерирован!</h3>
            <p className="text-sm text-gray-500 mb-6">Файл скачан на ваш компьютер. Проверьте его перед отправкой.</p>
            <div className="flex gap-3 justify-center">
              <button onClick={() => { setStep(1); setFile(null); setFields([]); setNewValues({}); setCustomRows([{from:'',to:''}]); }}
                className="px-5 py-2.5 rounded-xl text-sm font-bold border-2 border-violet-200 text-violet-700 hover:bg-violet-50">
                ⚡ Новый договор
              </button>
              <button onClick={onClose} className="px-5 py-2.5 rounded-xl text-sm font-bold bg-gradient-to-r from-violet-600 to-indigo-600 text-white">
                Закрыть
              </button>
            </div>
          </div>
        )}
      </div>

      {/* Footer buttons */}
      {step === 2 && (
        <div className="px-6 pb-6 flex justify-between items-center border-t border-violet-100 pt-4">
          <button onClick={() => setStep(1)} className="px-4 py-2 text-sm font-medium text-violet-600 hover:bg-violet-50 rounded-xl transition">← Назад</button>
          <button onClick={handleGenerate} disabled={loading}
            className="px-6 py-2.5 rounded-xl text-sm font-bold bg-gradient-to-r from-fuchsia-600 to-violet-600 text-white hover:from-fuchsia-700 hover:to-violet-700 transition shadow-lg disabled:opacity-50 flex items-center gap-2">
            {loading ? <span className="animate-spin">⏳</span> : '⚡'} {loading ? 'Генерирую...' : 'Сгенерировать и скачать'}
          </button>
        </div>
      )}
    </div>
  );
}

function App() {
  const [docs, setDocs] = useLocalStorage('docflow_docs_v6', SAMPLE_DOCS);
  const [folders, setFolders] = useLocalStorage('docflow_folders_v6', FOLDER_TREE);
  const [selectedFolder, setSelectedFolder] = useState(null);
  const [view, setView] = useState('grid');
  const [search, setSearch] = useState('');
  const [filterStatus, setFilterStatus] = useState('');
  const [filterType, setFilterType] = useState('');
  const [sortBy, setSortBy] = useState('name');
  const [showForm, setShowForm] = useState(false);
  const [editDoc, setEditDoc] = useState(null);
  const [detailDoc, setDetailDoc] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [showGenerator, setShowGenerator] = useState(false);

  const allFolders = useMemo(() => flattenTree(folders), [folders]);
  const currentFolderInfo = allFolders.find(f => f.id === selectedFolder);
  const isEmp = EMPLOYEE_FOLDER_IDS.includes(selectedFolder);
  const statusList = isEmp ? EMPLOYEE_STATUSES : CONTRACT_STATUSES;

  const visibleDocs = useMemo(() => {
    let d = selectedFolder ? docs.filter(x => x.folderId === selectedFolder) : docs;
    if (search) d = d.filter(x => x.name.toLowerCase().includes(search.toLowerCase()) || x.counterparty.toLowerCase().includes(search.toLowerCase()));
    if (filterStatus) d = d.filter(x => x.status === filterStatus);
    if (filterType) d = d.filter(x => x.type === filterType);
    d = [...d].sort((a, b) => {
      if (sortBy === 'name') return a.name.localeCompare(b.name);
      if (sortBy === 'endDate') return (a.endDate||'').localeCompare(b.endDate||'');
      if (sortBy === 'status') return a.status.localeCompare(b.status);
      return 0;
    });
    return d;
  }, [docs, selectedFolder, search, filterStatus, filterType, sortBy]);

  const saveDoc = doc => {
    setDocs(prev => { const i = prev.findIndex(d => d.id === doc.id); if (i >= 0) { const n=[...prev]; n[i]=doc; return n; } return [...prev, doc]; });
    setShowForm(false); setEditDoc(null);
  };
  const deleteDoc = id => setDocs(prev => prev.filter(d => d.id !== id));
  const changeStatus = (id, status) => {
    setDocs(prev => prev.map(d => d.id === id ? { ...d, status } : d));
    setDetailDoc(prev => prev?.id === id ? { ...prev, status } : prev);
  };
  const toggleStep = (docId, stepId, val) => {
    setDocs(prev => prev.map(d => d.id === docId ? { ...d, steps: { ...(d.steps || defaultSteps(d.folderId) || {}), [stepId]: val } } : d));
    setDetailDoc(prev => prev?.id === docId ? { ...prev, steps: { ...(prev.steps || defaultSteps(prev.folderId) || {}), [stepId]: val } } : prev);
  };
  const addFolder = (parentId, label) => setFolders(prev => prev.map(g => g.id === parentId ? { ...g, children: [...(g.children||[]), { id: `${parentId}-${Date.now()}`, label, icon: '📂' }] } : g));
  const renameFolder = (id, label) => setFolders(prev => prev.map(g => ({ ...g, children: (g.children||[]).map(c => c.id === id ? { ...c, label } : c) })));
  const deleteFolder = (id, parentId) => {
    setFolders(prev => prev.map(g => g.id === parentId ? { ...g, children: (g.children||[]).filter(c => c.id !== id) } : g));
    setDocs(prev => prev.filter(d => d.folderId !== id));
    if (selectedFolder === id) setSelectedFolder(null);
  };

  return (
    <div className="h-screen flex overflow-hidden">
      {sidebarOpen && <div className="fixed inset-0 z-30 bg-violet-950/50 lg:hidden" onClick={() => setSidebarOpen(false)} />}
      <Sidebar folders={folders} selectedFolder={selectedFolder} onSelect={id => { setSelectedFolder(id); setSidebarOpen(false); }}
        onAddFolder={addFolder} onRenameFolder={renameFolder} onDeleteFolder={deleteFolder} sidebarOpen={sidebarOpen} />

      <main className="flex-1 flex flex-col overflow-hidden">
        {/* Topbar */}
        <div className="bg-white/80 backdrop-blur-sm border-b-2 border-violet-100 px-4 lg:px-6 py-3 flex items-center gap-3 shadow-sm">
          <button className="lg:hidden p-2 rounded-xl text-violet-500 hover:bg-violet-50" onClick={() => setSidebarOpen(true)}>
            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" /></svg>
          </button>
          <div className="flex-1 relative">
            <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-violet-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            <input className="w-full max-w-md pl-9 pr-3 py-2 text-sm border-2 border-violet-100 rounded-xl focus:outline-none focus:border-violet-400 bg-violet-50/50 text-gray-700 font-medium placeholder-violet-300"
              placeholder="Поиск по названию или контрагенту..." value={search} onChange={e => setSearch(e.target.value)} />
          </div>
          <button onClick={() => setShowGenerator(true)}
            className="flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-fuchsia-500 to-violet-500 text-white text-sm font-bold rounded-xl hover:from-fuchsia-600 hover:to-violet-600 transition shadow-lg shadow-fuchsia-200 whitespace-nowrap">
            <span>⚡</span> <span className="hidden sm:inline">Генератор</span>
          </button>
          <button onClick={() => { setEditDoc(null); setShowForm(true); }}
            className="flex items-center gap-2 px-5 py-2 bg-gradient-to-r from-violet-600 to-indigo-600 text-white text-sm font-bold rounded-xl hover:from-violet-700 hover:to-indigo-700 transition shadow-lg shadow-violet-200 whitespace-nowrap">
            <span className="text-base leading-none">✨</span> Добавить
          </button>
        </div>

        {/* Content */}
        <div className="flex-1 overflow-y-auto p-4 lg:p-6">
          {selectedFolder === null ? (
            <Dashboard docs={docs} folders={folders} onSelectFolder={setSelectedFolder} />
          ) : (
            <div className="fade-in">
              <div className="flex items-center justify-between gap-4 mb-5 flex-wrap">
                <div>
                  <h1 className="text-2xl font-extrabold bg-gradient-to-r from-violet-700 to-indigo-600 bg-clip-text text-transparent">{currentFolderInfo?.icon} {currentFolderInfo?.label}</h1>
                  <p className="text-sm text-violet-400 mt-0.5 font-semibold">{visibleDocs.length} документов</p>
                </div>
                <div className="flex items-center gap-2 flex-wrap">
                  <select className="text-xs border-2 border-violet-100 rounded-xl px-3 py-1.5 focus:outline-none focus:border-violet-400 bg-white font-semibold text-violet-700" value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
                    <option value="">Все статусы</option>
                    {statusList.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                  </select>
                  <select className="text-xs border-2 border-violet-100 rounded-xl px-3 py-1.5 focus:outline-none focus:border-violet-400 bg-white font-semibold text-violet-700" value={filterType} onChange={e => setFilterType(e.target.value)}>
                    <option value="">Все типы</option>
                    {DOC_TYPES.map(t => <option key={t}>{t}</option>)}
                  </select>
                  <select className="text-xs border-2 border-violet-100 rounded-xl px-3 py-1.5 focus:outline-none focus:border-violet-400 bg-white font-semibold text-violet-700" value={sortBy} onChange={e => setSortBy(e.target.value)}>
                    <option value="name">По названию</option>
                    <option value="endDate">По дате</option>
                    <option value="status">По статусу</option>
                  </select>
                  <div className="flex border-2 border-violet-100 rounded-xl overflow-hidden">
                    <button onClick={() => setView('grid')} className={`px-3 py-1.5 text-xs font-bold transition ${view === 'grid' ? 'bg-gradient-to-r from-violet-600 to-indigo-600 text-white' : 'bg-white text-violet-400 hover:bg-violet-50'}`}>⊞</button>
                    <button onClick={() => setView('list')} className={`px-3 py-1.5 text-xs font-bold transition ${view === 'list' ? 'bg-gradient-to-r from-violet-600 to-indigo-600 text-white' : 'bg-white text-violet-400 hover:bg-violet-50'}`}>☰</button>
                  </div>
                </div>
              </div>

              {visibleDocs.length === 0 ? (
                <div className="text-center py-20 text-violet-300">
                  <div className="text-6xl mb-4">📭</div>
                  <div className="text-lg font-bold text-violet-400">Документов нет</div>
                  <div className="text-sm mt-1 text-violet-300">Нажмите «✨ Добавить» чтобы создать первый документ</div>
                </div>
              ) : (
                <div className={view === 'grid' ? 'grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4' : 'space-y-2'}>
                  {visibleDocs.map(doc => (
                    <DocCard key={doc.id} doc={doc} view={view} onClick={() => setDetailDoc(doc)} />
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      </main>

      {showGenerator && (
        <Modal onClose={() => setShowGenerator(false)}>
          <ContractGenerator onClose={() => setShowGenerator(false)} />
        </Modal>
      )}
      {(showForm || editDoc) && (
        <Modal onClose={() => { setShowForm(false); setEditDoc(null); }}>
          <DocForm doc={editDoc} folderId={selectedFolder} folders={allFolders} onSave={saveDoc} onClose={() => { setShowForm(false); setEditDoc(null); }} />
        </Modal>
      )}
      {detailDoc && (
        <Modal onClose={() => setDetailDoc(null)}>
          <DocDetail doc={detailDoc} folders={folders} onClose={() => setDetailDoc(null)}
            onEdit={doc => { setDetailDoc(null); setEditDoc(doc); }}
            onDelete={deleteDoc} onStatusChange={changeStatus} onStepToggle={toggleStep} />
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
